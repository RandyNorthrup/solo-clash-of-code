# Self-hosted Judge0 CE — the multi-language execution sandbox.
# Start it with:  docker compose up -d
# It exposes the REST API on http://localhost:2358 which the Vite dev server
# proxies under /judge0 (see vite.config.ts).
#
# Note: Judge0 needs privileged containers for its sandbox (isolate). On Docker
# Desktop (macOS) this works, but if you hit cgroup errors see:
# https://github.com/judge0/judge0/blob/master/CHANGELOG.md
services:
  server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - '2358:2358'
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  workers:
    image: judge0/judge0:1.13.1
    command: ['./scripts/workers']
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  db:
    image: postgres:16.2
    env_file: judge0.conf
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    restart: always

  redis:
    image: redis:7.2.4
    command:
      [
        'bash',
        '-c',
        'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"',
      ]
    env_file: judge0.conf
    volumes:
      - redis-data:/data
    restart: always

volumes:
  postgres-data:
  redis-data:
