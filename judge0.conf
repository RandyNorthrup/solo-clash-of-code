# Judge0 configuration. These are local-dev credentials only.
# Database
POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0secret

# Redis
REDIS_HOST=redis
REDIS_PORT=6379
REDIS_PASSWORD=judge0redis

# Allow the dev frontend to be served while keeping submissions synchronous-friendly
ALLOW_ORIGIN=*
MAINTENANCE_MODE=false
ENABLE_WAIT_RESULT=true
ENABLE_COMPILER_OPTIONS=true
