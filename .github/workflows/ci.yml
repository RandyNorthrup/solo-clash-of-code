name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # Aggregate gate: typecheck + lint + format + dead-code + audit(high) + tests + build
      - run: npm run quality
      # Coverage threshold gate on pure-logic modules (≥90% stmts/funcs/lines, ≥80% branches).
      # Runs separately so failures report the exact uncovered files.
      - run: npm run test:coverage
      # Direct Lighthouse gate (Performance / Accessibility / Best-Practices; SEO excluded).
      # ubuntu-latest ships Chrome for the local Lighthouse runner.
      - run: npm run lighthouse

# Note: the live execution gates (test:e2e / verify:judge0) are NOT run in CI.
# They require a Judge0 sandbox on a cgroup-v1 host, which GitHub-hosted runners
# (cgroup v2) do not provide. Run them on a self-hosted cgroup-v1 runner or
# locally — see README troubleshooting.
